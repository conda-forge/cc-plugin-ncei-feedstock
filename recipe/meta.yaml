{% set version = "2.0.4" %}

package:
  name: cc-plugin-ncei
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/cc-plugin-ncei/cc_plugin_ncei-{{ version }}.tar.gz
  sha256: 3d767a4cf4999d303d8730b4ec4d898b9d43880db2eae36586268141e77a8654

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - compliance-checker >=2.2.0
    - isodate >=0.5.4
    - six >=1.10.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - cc_plugin_ncei

about:
  home: https://github.com/ioos/cc-plugin-ncei/
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: 'Compliance Checker NCEI Templates Compliance plugin'

extra:
  recipe-maintainers:
    - Bobfrat
    - benjwadams
    - daf
    - kwilcox
    - lukecampbell
    - ocefpaf
